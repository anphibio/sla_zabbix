services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: app_frontend
    env_file:
      - .env
    ports:
      - "3000:3000"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
