services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite+pysqlite:///app/backend/zabbix_sla.db}
      ZABBIX_API_URL: ${ZABBIX_API_URL:-https://zabbix.example/api_jsonrpc.php}
      ZABBIX_API_TOKEN: ${ZABBIX_API_TOKEN:-}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app/backend
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
