services:
  db:
    image: postgres:17.10-alpine3.23
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zabbix_sla}
      POSTGRES_USER: ${POSTGRES_USER:-zabbix_sla}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zabbix_sla}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-zabbix_sla} -d ${POSTGRES_DB:-zabbix_sla}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
